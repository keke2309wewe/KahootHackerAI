<!DOCTYPE html>
<html>
<head>
    <style>
        body { width: 340px; font-family: 'Segoe UI', Tahoma, sans-serif; padding: 15px; background: #1a1a1a; color: #fff; margin: 0; }
        h3 { margin-top: 0; color: #00ff00; font-size: 18px; text-align: center; border-bottom: 1px solid #333; padding-bottom: 10px; }
        
        .stats { text-align: center; margin-bottom: 15px; font-size: 13px; color: #aaa; line-height: 1.5; }
        .stats span { color: #00ff00; font-weight: bold; }
        
        #panicBtn { background: #ff0000; margin-bottom: 15px; }
        #panicBtn:hover { background: #cc0000; }
        
        label { font-size: 13px; font-weight: bold; margin-bottom: 4px; display: block; color: #ddd; }
        .guide { font-size: 11px; color: #888; margin-bottom: 10px; display: block; line-height: 1.3; }
        select, input { width: 100%; padding: 10px; margin-bottom: 15px; box-sizing: border-box; background: #2a2a2a; color: white; border: 1px solid #444; border-radius: 6px; }
        select:focus, input:focus { outline: none; border-color: #00ff00; }
        
        .split-input { display: flex; gap: 10px; margin-bottom: 15px; }
        .split-input input { margin-bottom: 0; }

        button { width: 100%; padding: 12px; background: #00ff00; color: #000; border: none; font-weight: bold; font-size: 14px; cursor: pointer; border-radius: 6px; transition: 0.2s; }
        button:hover { background: #00cc00; }

        .log-container { margin-top: 20px; border-top: 1px solid #333; padding-top: 15px; }
        textarea { width: 100%; height: 120px; background: #0a0a0a; color: #00ff00; border: 1px solid #333; font-family: monospace; font-size: 10px; padding: 5px; box-sizing: border-box; resize: none; margin-bottom: 10px; }
        #clearLogsBtn { background: #555; padding: 8px; font-size: 12px; color: #fff; }
        #clearLogsBtn:hover { background: #777; }
    </style>
</head>
<body>
    <h3>Kahoot AI Stealth</h3>
    
    <div class="stats">
        In: <span id="inCount">0</span> | Out: <span id="outCount">0</span><br>
        Spent: $<span id="totalCost">0.00000</span>
    </div>
    
    <button id="panicBtn">PANIC: OFF (AI ACTIVE)</button>
    
    <label for="provider">API Provider</label>
    <select id="provider">
        <option value="openrouter">OpenRouter (Default)</option>
        <option value="openai">OpenAI</option>
        <option value="custom">Custom Endpoint</option>
    </select>

    <div id="customUrlGroup" style="display: none;">
        <input type="text" id="customUrl" placeholder="https://api.your-server.com/v1/chat/completions">
    </div>

    <label for="apiKey">API Key</label>
    <input type="password" id="apiKey" placeholder="sk-...">
    
    <label for="model">AI Model</label>
    <input type="text" id="model" value="google/gemini-2.5-flash">

    <label>Stealth Styling (Cumulative)</label>
    <div style="display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 15px; font-size: 12px;">
        <label style="display: inline; font-weight: normal;"><input type="checkbox" id="styleBold"> Bold</label>
        <label style="display: inline; font-weight: normal;"><input type="checkbox" id="styleItalic"> Italic</label>
        <label style="display: inline; font-weight: normal;"><input type="checkbox" id="styleColor"> Eggshell Color</label>
        <label style="display: inline; font-weight: normal;"><input type="checkbox" id="styleFont"> Monospace</label>
        <label style="display: inline; font-weight: normal;"><input type="checkbox" id="styleGhost"> Ghost Ink</label>
    </div>

    <label>Cost per 1M Tokens ($)</label>
    <span class="guide">Defaults set to Gemini 2.5 Flash pricing.</span>
    <div class="split-input">
        <input type="number" step="0.01" id="inCost" title="Input Cost" value="0.30">
        <input type="number" step="0.01" id="outCost" title="Output Cost" value="2.50">
    </div>
    
    <button id="save">Save Settings</button>

    <div class="log-container">
        <label>System Logs</label>
        <textarea id="logArea" readonly></textarea>
        <button id="clearLogsBtn">Clear Logs</button>
    </div>

    <script src="popup.js"></script>
</body>
</html>
